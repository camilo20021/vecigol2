<main class="login-main">
    <div class="login-container">
        <div class="login-header">
            <img src="img/logo-removebg-preview.png" alt="Logo VeciGol" class="login-logo">
            <h2 class="login-title">Bienvenido a VeciGol</h2>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="formlogin" class="login-form">
            <div class="form-group">
                <label for="usuario" class="form-label">
                    <span class="label-icon">👤</span> Usuario
                </label>
                <input type="text" id="usuario" class="form-input" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label for="contrasena" class="form-label">
                    <span class="label-icon">🔒</span> Contraseña
                </label>
                <input type="password" id="contrasena" class="form-input" placeholder="Ingresa tu contraseña" required>
            </div>

            <button class="btn-ingreso" type="submit">
                <span class="btn-text">Iniciar Sesión</span>
                <span class="btn-icon">→</span>
            </button>
        </form>

        <div id="mensaje" class="message"></div>
    </div>
</main>
