<main>

<h2> Reservar tu Cancha</h2>

<div id="disponibilidad-mensaje" class="disponibilidad-mensaje" style="display: none;"></div>

<form id="formularioReserva" class="formulario-moderno">
    
    <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
    </div>

    <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required>
    </div>

    <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="3XX XXX XXXX" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="cancha">Selecciona la Cancha</label>
            <select id="cancha" required>
                <option value="">Escoge una cancha...</option>
                <option value="cancha1">Cancha 1 - $110.000/hora</option>
                <option value="cancha2">Cancha 2 - $90.000/hora</option>
            </select>
        </div>

        <div class="form-group">
            <label for="jugadores">Número de Jugadores</label>
            <input type="number" id="jugadores" placeholder="Ej: 10" min="4" max="22" required>
        </div>
    </div>

    <div class="form-group">
        <label for="fecha">Fecha y Hora</label>
        <input type="datetime-local" id="fecha" required>
    </div>

    <div class="form-group">
        <label for="duracion">Duración</label>
        <select id="duracion" required>
            <option value="">Selecciona duración...</option>
            <option value="1">1 hora</option>
            <option value="2">2 horas</option>
            <option value="3">3 horas</option>
        </select>
    </div>

    <div class="form-group">
        <label for="comentarios">Comentarios Adicionales</label>
        <textarea id="comentarios" placeholder="Cuéntanos si necesitas algo especial..." rows="4"></textarea>
    </div>

    <button type="submit" class="btn-enviar">✅ Confirmar Reserva</button>

</form>

<div id="modalNoDisponible" class="modal-nodisponible" style="display: none;">
    <div class="modal-contenido">
        <div class="modal-header">
            <h3>❌ Cancha No Disponible</h3>
            <button class="cerrar-modal" onclick="cerrarModalNoDisponible()">✕</button>
        </div>
        
        <div class="modal-body">
            <p id="mensaje-nodisponible"></p>
            
            <div class="opciones-agendamiento">
                <h4>Opciones disponibles:</h4>
                <div id="horarios-disponibles" class="horarios-grid">
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-agendar-diferente" onclick="agendarDiferente()">📅 Agendar en otra fecha</button>
            <button class="btn-cancelar" onclick="cerrarModalNoDisponible()">Volver</button>
        </div>
    </div>
</div>
